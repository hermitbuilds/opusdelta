name: ◉ System Status

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  status:
    name: Generate Status
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate system status
        run: python scripts/status.py

      - name: Commit & push
        run: |
          git config user.name "opus-delta[bot]"
          git config user.email "research@opusdelta.io"
          git add README.md
          git diff --cached --quiet || git commit -m "◉ system status · cycle $(python3 -c 'import datetime; print((datetime.datetime.utcnow().date() - datetime.date(2026,1,1)).days)')"
          git push
